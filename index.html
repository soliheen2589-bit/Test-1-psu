<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d1117;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#161b22;
    padding:35px;
    width:320px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h2{
    color:white;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#238636;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2ea043;
}

#message{
    margin-top:15px;
    color:#58a6ff;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>เข้าสู่ระบบ</h2>

    <input type="text" id="username" placeholder="กรอกชื่อ">

    <button onclick="login()">Login</button>

    <p id="message"></p>
</div>

<script>
function login(){
    const username = document.getElementById("username").value.trim();

    if(username === ""){
        alert("กรุณากรอกชื่อ");
        return;
    }

    document.getElementById("message").innerHTML =
        "ยินดีต้อนรับ " + username + " 🎉";
}
</script>

</body>
</html>
